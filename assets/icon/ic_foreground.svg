<svg width="108" height="108" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
  <!--
    Android adaptive icon foreground layer.
    Canvas: 108x108dp. Safe zone (always visible across all launcher masks):
    centered 72x72dp, i.e. x/y from 18 to 90.
    The barbell is drawn centered at (54,54), rotated -25deg, and sized to
    stay within the 72x72 safe zone with margin.
  -->
  <g transform="translate(54,54) rotate(-25) scale(0.7)">
    <!-- bar -->
    <rect x="-26" y="-4" width="52" height="8" rx="2" fill="#E8A020"/>
    <!-- collars (inner, smaller) -->
    <rect x="-35" y="-9" width="9" height="18" rx="2" fill="#E8A020"/>
    <rect x="26" y="-9" width="9" height="18" rx="2" fill="#E8A020"/>
    <!-- plates (outer, larger) -->
    <rect x="-44" y="-13" width="10" height="26" rx="2.5" fill="#E8A020"/>
    <rect x="34" y="-13" width="10" height="26" rx="2.5" fill="#E8A020"/>
  </g>
</svg>
