name: liftlog
description: A local-first workout tracker.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  # File system access
  path_provider: ^2.1.2
  path: ^1.9.0
  # JSON
  json_annotation: ^4.8.1
  # Date formatting
  intl: ^0.19.0
  # UUID generation
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
